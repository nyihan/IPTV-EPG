name: Auto Generate EPG Mapping
on:
  schedule:
    - cron: '0 0 * * *' # နေ့စဉ် မြန်မာစံတော်ချိန် မနက် ၆:၃၀
  workflow_dispatch:
jobs:
  generate-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate_mapping.js
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add channel_mapping.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update EPG Mapping"
          git push
