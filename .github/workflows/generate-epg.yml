name: Auto Generate EPG Mapping

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # ပြန်တင်ရာတွင် Error ကင်းစေရန်

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run EPG Mapping Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate_mapping.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add final_playlist.m3u
          
          # အပြောင်းအလဲရှိလျှင် Commit လုပ်မည်
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update EPG Mapping"
          
          # Error မတက်စေရန် အပြင်မှ အပြောင်းအလဲများကို အရင် Pull လုပ်ပြီးမှ Push မည်
          git pull --rebase origin main
          git push
